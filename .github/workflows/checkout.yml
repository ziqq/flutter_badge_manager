name: "CI"

on:
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/**"
      - "flutter_badge_manager/**"
      - "flutter_badge_manager_android/**"
      - "flutter_badge_manager_foundation/**"
      - "flutter_badge_manager_platform_interface/**"
  pull_request:
    branches: [ main ]
    paths:
      - ".github/workflows/**"
      - "flutter_badge_manager/**"
      - "flutter_badge_manager_android/**"
      - "flutter_badge_manager_foundation/**"
      - "flutter_badge_manager_platform_interface/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: "Detect changed packages"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: set-matrix
        run: |
          MATRIX_JSON='{"include":[{"name":"plugin","path":"flutter_badge_manager"},{"name":"android","path":"flutter_badge_manager_android"},{"name":"foundation","path":"flutter_badge_manager_foundation"},{"name":"interface","path":"flutter_badge_manager_platform_interface"}]}'
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

  package-ci:
    name: "Package (${{ matrix.name }})"
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Install Flutter"
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: "Flutter version"
        run: flutter --version

      - name: "Cache pub"
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ matrix.name }}-${{ hashFiles(format('{0}/pubspec.lock', matrix.path)) }}
          restore-keys: |
            ${{ runner.os }}-pub-${{ matrix.name }}-
            ${{ runner.os }}-pub-

      - name: "Pub get"
        working-directory: ${{ matrix.path }}
        run: flutter pub get

      - name: "Format check"
        working-directory: ${{ matrix.path }}
        run: |
          find lib test \
          -path '*/generated/*' -prune -o \
          -type f -name '*.dart' \
          ! -name '*.*.dart' \
          ! -name '*.g.*.dart' \
          -print0 |
          xargs -0 dart format --set-exit-if-changed --line-length 80 -o none

      - name: "Analyze"
        working-directory: ${{ matrix.path }}
        run: dart analyze --fatal-infos --fatal-warnings lib/

      - name: "Tests"
        working-directory: ${{ matrix.path }}
        run: |
          if ls test/*.dart >/dev/null 2>&1; then
            flutter test --coverage
          else
            echo "No tests"
          fi

      - name: "Upload partial coverage artifact"
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.name }}
          path: ${{ matrix.path }}/coverage/lcov.info
          if-no-files-found: ignore

  coverage-merge:
    name: "Merge coverage & Codecov"
    needs: package-ci
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: "Download coverage artifacts"
        uses: actions/download-artifact@v4
        with:
          path: coverage_parts
          pattern: coverage-*
      - name: "Merge lcov files"
        run: |
          sudo apt-get update && sudo apt-get install -y lcov
          mkdir -p merged

          # Map artifact names back to package paths
          declare -A ARTIFACT_TO_PATH=(
            ["coverage-plugin"]="flutter_badge_manager"
            ["coverage-android"]="flutter_badge_manager_android"
            ["coverage-foundation"]="flutter_badge_manager_foundation"
            ["coverage-interface"]="flutter_badge_manager_platform_interface"
          )

          FIRST=true
          for dir in coverage_parts/coverage-*/; do
            ARTIFACT_NAME=$(basename "$dir")
            PKG_PATH="${ARTIFACT_TO_PATH[$ARTIFACT_NAME]}"
            LCOV_FILE="$dir/lcov.info"

            if [ ! -f "$LCOV_FILE" ]; then
              echo "No lcov.info in $dir, skipping"
              continue
            fi

            # Prefix SF: paths with the package directory
            # so Codecov maps files correctly in the monorepo
            if [ -n "$PKG_PATH" ]; then
              sed -i "s|^SF:|SF:${PKG_PATH}/|" "$LCOV_FILE"
            fi

            if $FIRST; then
              cp "$LCOV_FILE" merged/lcov.info
              FIRST=false
            else
              lcov -a merged/lcov.info -a "$LCOV_FILE" -o merged/lcov.tmp
              mv merged/lcov.tmp merged/lcov.info
            fi
          done

          if [ ! -f merged/lcov.info ]; then
            echo "No coverage files found"; exit 0
          fi

          lcov --remove merged/lcov.info '*_test.dart' -o merged/lcov.info || true
          echo "Merged coverage:"
          lcov --summary merged/lcov.info || true
      - name: "Upload merged artifact"
        uses: actions/upload-artifact@v4
        with:
          name: coverage-merged
          path: merged/lcov.info
          if-no-files-found: ignore
      - name: "Upload to Codecov"
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: merged/lcov.info
          fail_ci_if_error: false