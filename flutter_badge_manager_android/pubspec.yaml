name: flutter_badge_manager_android
description: Android implementation of the flutter_badge_manager plugin.
version: 0.1.1

homepage: https://github.com/ziqq/flutter_badge_manager

repository: https://github.com/ziqq/flutter_badge_manager/tree/main/flutter_badge_manager_android

issue_tracker: https://github.com/ziqq/flutter_badge_manager/issues

funding:
  - https://www.buymeacoffee.com/ziqq
  - https://boosty.to/ziqq

#screenshots:
#  - description: 'Example of using the library to check app version.'
#    path: example.png

topics:
  - badge
  - manager


environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: ">=3.29.0"


dependencies:
  flutter:
    sdk: flutter

  flutter_badge_manager_platform_interface: ^0.1.0
  # flutter_badge_manager_platform_interface:
  #   path: ../flutter_badge_manager_platform_interface


dev_dependencies:
  # Integration tests for Flutter
  integration_test:
    sdk: flutter
  # Unit & Widget tests for Flutter
  flutter_test:
    sdk: flutter

  pigeon: ^26.0.2

  # Linting
  flutter_lints: ^6.0.0


flutter:
  plugin:
    implements: flutter_badge_manager
    platforms:
      android:
        package: flutter.plugins.flutterbadgemanager
        pluginClass: FlutterBadgeManagerPlugin
        dartPluginClass: FlutterBadgeManagerAndroid

